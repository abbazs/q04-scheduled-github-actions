name: Daily Commit
on:
  schedule:
    - cron: '30 0 * * *'  # Daily at 00:30 UTC
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Setup with 22f2000997@ds.study.iitm.ac.in
        uses: actions/checkout@v4
      
      - name: Create daily commit
        run: |
          echo "Daily update: $(date)" >> log.txt
          
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "22f2000997@ds.study.iitm.ac.in"
          git add log.txt
          git commit -m "Daily commit on $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
